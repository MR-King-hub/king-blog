# HTTPS 生产配置（需先运行 deploy/scripts/setup-ssl.sh 申请证书）

# HTTP → HTTPS（保留 ACME 续期路径）
server {
    listen 80;
    server_name relayagent.cloud www.relayagent.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.relayagent.cloud$request_uri;
    }
}

# 裸域名 → www
server {
    listen 443 ssl;
    http2 on;
    server_name relayagent.cloud;

    ssl_certificate     /etc/letsencrypt/live/relayagent.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relayagent.cloud/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://www.relayagent.cloud$request_uri;
}

# 主站
server {
    listen 443 ssl;
    http2 on;
    server_name www.relayagent.cloud;

    ssl_certificate     /etc/letsencrypt/live/relayagent.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relayagent.cloud/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
}
